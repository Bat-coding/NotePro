{% extends "base.html" %}
{% block content %}
<header class="page-header">
    <h1 class="page-title">Saisie des Notes — {{ eval_info.titre }}</h1>
</header>

<div class="table-container p-4">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <table class="modern-table mb-4">
            <thead>
                <tr>
                    <th>Étudiant</th>
                    <th style="text-align:right; width: 150px;">Note / 20</th>
                </tr>
            </thead>
            <tbody>
            {% for e in etudiants %}
                <tr>
                    <td class="font-weight-600">
                        <i class="bi bi-person-circle text-muted me-2"></i> {{ e.username }}
                    </td>
                    <td style="text-align:right">
                        <input type="number" name="note_{{ e.id }}" class="form-control text-end" min="0" max="20" step="0.5" placeholder="0.0">
                    </td>
                </tr>
            {% else %}
                <tr><td colspan="2" class="text-center py-5 text-muted">Aucun étudiant inscrit dans cette classe</td></tr>
            {% endfor %}
            </tbody>
        </table>
        <div class="text-end">
            <button type="submit" class="btn btn-primary px-5 font-weight-bold shadow-sm">
                <i class="bi bi-check2-circle"></i> Enregistrer les notes
            </button>
        </div>
    </form>
</div>
{% endblock %}
