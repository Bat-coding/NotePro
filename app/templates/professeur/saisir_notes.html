{% extends "base.html" %}
{% block content %}
<h2>Notes — {{ eval_info.titre }}</h2>
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <table class="table table-bordered">
        <thead><tr><th>Étudiant</th><th>Note /20</th></tr></thead>
        <tbody>
        {% for e in etudiants %}
            <tr>
                <td>{{ e.username }}</td>
                <td><input type="number" name="note_{{ e.id }}" class="form-control" min="0" max="20" step="0.5"></td>
            </tr>
        {% else %}
            <tr><td colspan="2">Aucun étudiant dans cette classe</td></tr>
        {% endfor %}
        </tbody>
    </table>
    <button type="submit" class="btn btn-success">Enregistrer les notes</button>
</form>
{% endblock %}
