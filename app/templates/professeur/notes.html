{% extends "base.html" %}
{% block content %}
<style>
    body {
        background: #e8eaed !important;
        font-family: Arial, sans-serif;
    }

    /* ── En-tête ─────────────────────────────────── */
    .pn-page-header {
        margin-bottom: 10px;
        padding: 12px 0 10px;
        border-bottom: 2px solid #3a6ea5;
    }

    .pn-page-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #1e293b;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin: 0;
    }

    /* ── Panneaux ───────────────────────────────────── */
    .pn-panel {
        background: #fff;
        border: 1px solid #d0d3d8;
        max-width: 700px;
        margin: 0 auto;
    }

    .pn-panel-header {
        padding: 7px 14px;
        background: #4a5568;
        color: #fff;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: .05em;
        text-transform: uppercase;
    }

    .pn-panel-body {
        font-size: 0.84rem;
    }

    .pn-row {
        padding: 12px 14px;
        border-bottom: 1px solid #eef0f2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-decoration: none;
        color: inherit;
        transition: background .12s;
    }

    .pn-row:hover {
        background: #f6f7f8;
        color: #3a6ea5;
    }

    .pn-row:last-child {
        border-bottom: none;
    }

    .pn-row-title {
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .pn-row-icon {
        color: #c0c8d0;
        font-size: 1rem;
    }

    .pn-row-arrow {
        color: #c0c8d0;
        font-size: 0.8rem;
    }

    .pn-row:hover .pn-row-icon,
    .pn-row:hover .pn-row-arrow {
        color: #3a6ea5;
    }

    .pn-empty {
        text-align: center;
        padding: 4rem;
        color: #a0a8b0;
        font-size: 0.82rem;
        font-style: italic;
    }

    .pn-link {
        color: #3a6ea5;
        text-decoration: none;
        font-weight: 700;
    }

    .pn-link:hover {
        text-decoration: underline;
    }
</style>

<div class="pn-page-header">
    <h1 class="pn-page-title">Saisie des Notes</h1>
</div>

<div class="pn-panel">
    <div class="pn-panel-header">Sélectionner une évaluation</div>
    <div class="pn-panel-body">
        {% for e in evaluations %}
        <a href="/professeur/notes/{{ e.id }}" class="pn-row">
            <span class="pn-row-title">
                <span class="pn-row-icon">📋</span>
                {{ e.titre }}
            </span>
            <span class="pn-row-arrow">&#9654;</span>
        </a>
        {% else %}
        <div class="pn-empty">
            <p>Aucune évaluation créée pour le moment.</p>
            <a href="/professeur/evaluations" class="pn-link">Cliquez ici pour créer une évaluation</a>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
