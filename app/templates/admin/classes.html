{% extends "base.html" %}
{% block content %}
<div class="page-title"><i class="bi bi-building-fill"></i> Gestion des Classes</div>
<div class="card p-4 mb-4" style="border-radius:14px">
    <h6 style="font-weight:700;color:#1a2b4a;margin-bottom:16px"><i class="bi bi-plus-circle-fill text-primary"></i> Ajouter une classe</h6>
    <form method="POST" action="/admin/classes/add" class="d-flex gap-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="text" name="nom" class="form-control" style="border-radius:10px;border-color:#e2e8f0;max-width:320px" placeholder="Ex: GCS2-A" required>
        <button type="submit" class="btn btn-primary px-4" style="border-radius:10px;font-weight:600">
            <i class="bi bi-plus-lg"></i> Ajouter
        </button>
    </form>
</div>
<div class="card" style="border-radius:14px;overflow:hidden">
    <table class="table mb-0">
        <thead><tr><th>#</th><th>Nom de la classe</th><th style="text-align:right">Action</th></tr></thead>
        <tbody>
        {% for c in classes %}
            <tr>
                <td style="color:#94a3b8;font-size:.85rem">{{ c.id }}</td>
                <td><span style="font-weight:600;color:#1a2b4a">{{ c.nom }}</span></td>
                <td style="text-align:right">
                    <a href="/admin/classes/delete/{{ c.id }}" class="btn btn-sm" style="background:#fee2e2;color:#991b1b;border:none;border-radius:8px;font-size:.82rem;font-weight:600">
                        <i class="bi bi-trash3-fill"></i> Supprimer
                    </a>
                </td>
            </tr>
        {% else %}
            <tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:24px">Aucune classe créée</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
