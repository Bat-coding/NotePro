{% extends "base.html" %}
{% block content %}
<h2>Emplois du Temps</h2>
<form method="POST" action="/admin/emplois/add" class="mb-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-2">
        <div class="col">
            <select name="classe_id" class="form-select" required>
                <option value="">-- Classe --</option>
                {% for c in classes %}
                    <option value="{{ c.id }}">{{ c.nom }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col">
            <select name="jour" class="form-select" required>
                {% for j in ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'] %}
                    <option value="{{ j }}">{{ j }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col">
            <input type="time" name="heure_debut" class="form-control" required>
        </div>
        <div class="col">
            <input type="time" name="heure_fin" class="form-control" required>
        </div>
        <div class="col">
            <input type="text" name="matiere" class="form-control" placeholder="Matière" required>
        </div>
        <div class="col">
            <select name="professeur_id" class="form-select" required>
                <option value="">-- Professeur --</option>
                {% for p in profs %}
                    <option value="{{ p.id }}">{{ p.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>
    </div>
</form>

<table class="table table-bordered table-striped">
    <thead><tr><th>Jour</th><th>Début</th><th>Fin</th><th>Matière</th><th>Classe</th><th>Professeur</th><th>Action</th></tr></thead>
    <tbody>
    {% for e in emplois %}
        <tr>
            <td>{{ e.jour }}</td>
            <td>{{ e.heure_debut }}</td>
            <td>{{ e.heure_fin }}</td>
            <td>{{ e.matiere }}</td>
            <td>{{ e.classe_nom }}</td>
            <td>{{ e.prof_nom }}</td>
            <td><a href="/admin/emplois/delete/{{ e.id }}" class="btn btn-danger btn-sm">Supprimer</a></td>
        </tr>
    {% else %}
        <tr><td colspan="7">Aucun créneau</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
