{% extends "base.html" %}
{% block content %}
<div class="page-title"><i class="bi bi-calendar3-week-fill"></i> Emplois du Temps</div>
<div class="card p-4 mb-4" style="border-radius:14px">
    <h6 style="font-weight:700;color:#1a2b4a;margin-bottom:16px"><i class="bi bi-plus-circle-fill text-warning"></i> Ajouter un créneau</h6>
    <form method="POST" action="/admin/emplois/add">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-md-2">
                <select name="classe_id" class="form-select" style="border-radius:10px;border-color:#e2e8f0" required>
                    <option value="">Classe</option>
                    {% for c in classes %}<option value="{{ c.id }}">{{ c.nom }}</option>{% endfor %}
