{% extends "base.html" %}
{% block content %}
<div class="page-title"><i class="bi bi-speedometer2"></i> Tableau de bord</div>
<div class="row g-4">
    <div class="col-md-4">
        <a href="/admin/classes" class="text-decoration-none">
            <div class="card p-4" style="border-radius:14px;border-left:4px solid #3b82f6;transition:transform .2s" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                <div style="display:flex;align-items:center;gap:16px">
                    <div style="width:48px;height:48px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <i class="bi bi-building-fill" style="font-size:1.4rem;color:#3b82f6"></i>
                    </div>
                    <div>
                        <div style="font-weight:700;color:#1a2b4a;font-size:1rem">Classes</div>
                        <div style="color:#94a3b8;font-size:.82rem">Créer et gérer</div>
                    </div>
                    <i class="bi bi-chevron-right ms-auto" style="color:#cbd5e1"></i>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="/admin/users" class="text-decoration-none">
            <div class="card p-4" style="border-radius:14px;border-left:4px solid #22c55e;transition:transform .2s" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                <div style="display:flex;align-items:center;gap:16px">
                    <div style="width:48px;height:48px;background:#f0fdf4;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <i class="bi bi-people-fill" style="font-size:1.4rem;color:#22c55e"></i>
                    </div>
                    <div>
                        <div style="font-weight:700;color:#1a2b4a;font-size:1rem">Utilisateurs</div>
                        <div style="color:#94a3b8;font-size:.82rem">Gérer les comptes</div>
                    </div>
                    <i class="bi bi-chevron-right ms-auto" style="color:#cbd5e1"></i>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="/admin/emplois" class="text-decoration-none">
            <div class="card p-4" style="border-radius:14px;border-left:4px solid #f59e0b;transition:transform .2s" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                <div style="display:flex;align-items:center;gap:16px">
                    <div style="width:48px;height:48px;background:#fffbeb;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <i class="bi bi-calendar3-week-fill" style="font-size:1.4rem;color:#f59e0b"></i>
                    </div>
                    <div>
                        <div style="font-weight:700;color:#1a2b4a;font-size:1rem">Emplois du temps</div>
                        <div style="color:#94a3b8;font-size:.82rem">Créer les créneaux</div>
                    </div>
                    <i class="bi bi-chevron-right ms-auto" style="color:#cbd5e1"></i>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
