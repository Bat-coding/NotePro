{% extends "base.html" %}
{% block content %}
<header class="page-header">
    <h1 class="page-title">Tableau de bord</h1>
    <span class="text-muted small">{{ now }}</span>
</header>

<div class="row g-4">
    <div class="col-md-4">
        <a href="/admin/classes" class="text-decoration-none">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box" style="background: #eff6ff; color: #2563eb;">
                        <i class="bi bi-building-fill h4 mb-0"></i>
                    </div>
                    <div>
                        <div class="h5 mb-0 font-weight-bold">Classes</div>
                        <div class="small text-muted">Gérer les promotions</div>
                    </div>
                </div>
            </div>
        </a>
    </div>
    
    <div class="col-md-4">
        <a href="/admin/users" class="text-decoration-none">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box" style="background: #f0fdf4; color: #16a34a;">
                        <i class="bi bi-people-fill h4 mb-0"></i>
                    </div>
                    <div>
                        <div class="h5 mb-0 font-weight-bold">Utilisateurs</div>
                        <div class="small text-muted">Comptes et accès</div>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="/admin/emplois" class="text-decoration-none">
            <div class="stat-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box" style="background: #fffbeb; color: #d97706;">
                        <i class="bi bi-calendar3-week-fill h4 mb-0"></i>
                    </div>
                    <div>
                        <div class="h5 mb-0 font-weight-bold">Planning</div>
                        <div class="small text-muted">Emplois du temps</div>
                    </div>
                </div>
            </div>
        </a>
    </div>
</div>

<div class="mt-5">
    <div class="table-container p-4">
        <h5 class="mb-4 font-weight-bold">Actions rapides</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" style="border-radius: 0.75rem;"><i class="bi bi-plus-lg"></i> Nouveau message</button>
            <button class="btn btn-outline-secondary" style="border-radius: 0.75rem;"><i class="bi bi-download"></i> Exporter données</button>
        </div>
    </div>
</div>
{% endblock %}
