{% extends "base.html" %}
{% block content %}
<header class="page-header">
    <h1 class="page-title">Mon Emploi du Temps</h1>
</header>

<div class="table-container">
    <table class="modern-table">
        <thead>
            <tr>
                <th>Jour</th>
                <th>Horaire</th>
                <th>Matière</th>
                <th>Professeur</th>
            </tr>
        </thead>
        <tbody>
        {% for e in emplois %}
            <tr>
                <td class="font-weight-600">{{ e.jour }}</td>
                <td><small class="text-muted">{{ e.heure_debut }} - {{ e.heure_fin }}</small></td>
                <td><span class="font-weight-500">{{ e.matiere }}</span></td>
                <td><i class="bi bi-person-badge text-muted me-1"></i> {{ e.prof }}</td>
            </tr>
        {% else %}
            <tr><td colspan="4" class="text-center py-5 text-muted">Aucun créneau disponible</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
