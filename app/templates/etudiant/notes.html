{% extends "base.html" %}
{% block content %}
<style>
    .page-header-bar {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid #e5e7eb;
    }

    .page-header-bar h1 {
        font-size: 1.3rem;
        font-weight: 700;
        color: #111827;
        letter-spacing: -.02em;
        margin: 0 0 .15rem;
    }

    .page-header-bar p {
        font-size: .825rem;
        color: #6b7280;
        margin: 0;
    }

    .notes-table-wrap {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        overflow: hidden;
    }

    .notes-table {
        width: 100%;
        border-collapse: collapse;
        font-size: .875rem;
    }

    .notes-table thead tr {
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }

    .notes-table thead th {
        padding: .65rem 1rem;
        font-size: .72rem;
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: .06em;
        white-space: nowrap;
    }

    .notes-table tbody tr {
        border-bottom: 1px solid #f3f4f6;
        transition: background .1s;
    }

    .notes-table tbody tr:last-child {
        border-bottom: none;
    }

    .notes-table tbody tr:hover {
        background: #fafafa;
    }

    .notes-table td {
        padding: .75rem 1rem;
        color: #111827;
        vertical-align: middle;
    }

    .td-matiere {
        font-size: .72rem;
        color: #6b7280;
        margin-top: .1rem;
    }

    .note-pill {
        display: inline-block;
        font-size: .82rem;
        font-weight: 700;
        padding: .25rem .75rem;
        border-radius: 100px;
        line-height: 1;
    }

    .note-pill.good {
        background: #f0fdf4;
        color: #15803d;
        border: 1px solid #bbf7d0;
    }

    .note-pill.mid {
        background: #fffbeb;
        color: #b45309;
        border: 1px solid #fde68a;
    }

    .note-pill.bad {
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fecaca;
    }

    .empty-state {
        padding: 3rem 1rem;
        text-align: center;
        color: #9ca3af;
        font-size: .85rem;
    }

    .empty-state i {
        font-size: 1.75rem;
        display: block;
        margin-bottom: .5rem;
        opacity: .35;
    }
</style>

<div class="page-header-bar">
    <div>
        <h1>Mes notes</h1>
        <p>Résultats de toutes vos évaluations</p>
    </div>
</div>

<div class="notes-table-wrap">
    <table class="notes-table">
        <thead>
            <tr>
                <th>Évaluation</th>
                <th style="text-align:right;">Note / 20</th>
            </tr>
        </thead>
        <tbody>
            {% for note in notes %}
            <tr>
                <td>
                    <div style="font-weight:600; color:#111827;">{{ note.titre }}</div>
                    {% if note.matiere %}
                    <div class="td-matiere">{{ note.matiere }}</div>
                    {% endif %}
                </td>
                <td style="text-align:right;">
                    <span
                        class="note-pill {% if note.valeur >= 14 %}good{% elif note.valeur >= 10 %}mid{% else %}bad{% endif %}">
                        {{ note.valeur }}<span style="font-weight:400;color:inherit;opacity:.6;">/20</span>
                    </span>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2">
                    <div class="empty-state">
                        <i class="bi bi-star"></i>
                        Aucune note disponible.
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
