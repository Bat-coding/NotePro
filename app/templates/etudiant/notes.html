{% extends "base.html" %}
{% block content %}
<style>
    body {
        background: #e8eaed !important;
        font-family: Arial, sans-serif;
    }

    /* ── En-tête ─────────────────────────────────── */
    .pn-page-header {
        margin-bottom: 10px;
        padding: 12px 0 10px;
        border-bottom: 2px solid #3a6ea5;
    }

    .pn-page-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #1e293b;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin: 0;
    }

    /* ── Tableau ─────────────────────────────────── */
    .pn-table-block {
        background: #fff;
        border: 1px solid #d0d3d8;
        max-width: 800px;
    }

    .pn-table-header {
        padding: 7px 14px;
        background: #4a5568;
        color: #fff;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: .05em;
        text-transform: uppercase;
    }

    .pn-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.84rem;
    }

    .pn-table thead th {
        background: #f0f2f4;
        padding: 8px 14px;
        text-align: left;
        font-size: 0.68rem;
        font-weight: 700;
        color: #8a939e;
        text-transform: uppercase;
        letter-spacing: .05em;
        border-bottom: 1px solid #d0d3d8;
        border-right: 1px solid #e4e6e9;
    }

    .pn-table thead th:last-child {
        border-right: none;
        text-align: right;
    }

    .pn-table tbody td {
        padding: 10px 14px;
        border-bottom: 1px solid #eef0f2;
        color: #1e293b;
        vertical-align: middle;
        border-right: 1px solid #f0f2f4;
    }

    .pn-table tbody td:last-child {
        border-right: none;
        text-align: right;
    }

    .pn-table tbody tr:hover {
        background: #f6f7f8;
    }

    .pn-table tbody tr:last-child td {
        border-bottom: none;
    }

    /* ── Note Styling ────────────────────────────── */
    .pn-note {
        font-size: 1.1rem;
        font-weight: 700;
    }

    .pn-note-max {
        font-size: 0.7rem;
        font-weight: 400;
        color: #8a939e;
        margin-left: 2px;
    }

    .pn-empty {
        text-align: center;
        padding: 4rem;
        color: #a0a8b0;
        font-size: 0.8rem;
        font-style: italic;
    }
</style>

<!-- En-tête -->
<div class="pn-page-header">
    <h1 class="pn-page-title">Mes Notes et Résultats</h1>
</div>

<!-- Tableau des notes -->
<div class="pn-table-block">
    <div class="pn-table-header">Relevé de notes</div>
    <table class="pn-table">
        <thead>
            <tr>
                <th>Évaluation</th>
                <th>Matière</th>
                <th style="width:100px;text-align:right;">Note</th>
            </tr>
        </thead>
        <tbody>
            {% for note in notes %}
            <tr>
                <td><span style="font-weight:700;">{{ note.titre }}</span></td>
                <td><span style="color:#64748b;font-weight:700;">{{ note.matiere or '-' }}</span></td>
                <td style="text-align:right;">
                    <span class="pn-note {{ 'pn-note-bad' if note.valeur < 10 else ('pn-note-warn' if note.valeur < 14 else 'pn-note-good') }}">
                        {{ note.valeur }}<span class="pn-note-max">/20</span>
                    </span>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="pn-empty">Aucune note enregistrée pour le moment.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
