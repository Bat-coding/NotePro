{% extends "base.html" %}
{% block content %}
<h2>Mes Notes</h2>
<table class="table table-bordered">
    <thead><tr><th>Évaluation</th><th>Note</th></tr></thead>
    <tbody>
    {% for note in notes %}
        <tr><td>{{ note.titre }}</td><td>{{ note.valeur }}/20</td></tr>
    {% else %}
        <tr><td colspan="2">Aucune note disponible</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
