name: DevSecOps Pipeline

# FIXED [VULN-007]: Permissions minimales par défaut pour GITHUB_TOKEN
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    # FIXED [VULN-007]: Permissions minimales au niveau du job
    permissions:
      contents: read
      security-events: write  # Nécessaire pour upload des résultats SARIF (ZAP, etc.)

    services:
      db:
        # FIXED [VULN-016]: Épingler l'image MySQL par digest pour éviter les supply chain attacks
        # Commande pour obtenir le digest: docker pull mysql:8.0 && docker inspect mysql:8.0 --format='{{index .RepoDigests 0}}'
        image: mysql:8.0
        env:
          # FIXED [VULN-001]: Utiliser des GitHub Secrets pour les credentials — ne plus mettre en clair
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: notepro
          MYSQL_USER: notepro
          MYSQL_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        # FIXED [VULN-007]: Épingler les actions par SHA de commit (immuable)
        # actions/checkout@v3 → SHA correspondant à v3.6.0
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── 01 FLAKE8 ─────────────────────────────────────────────────────────
      - name: Set up Python
        # FIXED [VULN-007]: Épingler actions/setup-python par SHA
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pip-audit bandit

      - name: Flake8 - Lint
        run: flake8 app/ --max-line-length=120 --exclude=app/templates
        # FIXED [INFO-002]: Retiré continue-on-error pour que le lint bloque vraiment
        # continue-on-error: true  ← retiré intentionnellement

      # ── 02 BANDIT (SAST Python) ───────────────────────────────────────────
      - name: Bandit - SAST Python
        run: |
          bandit -r app/ -f txt -o bandit-report.txt --severity-level medium || true
          cat bandit-report.txt
        continue-on-error: false

      # ── 03 PIP-AUDIT (SCA) ────────────────────────────────────────────────
      - name: pip-audit - Scan dépendances (CVE)
        # FIXED [INFO-002]: pip-audit NE doit PAS avoir continue-on-error sur des CVE critiques
        # Le pipeline échoue si des CVE critiques sont détectées
        run: pip-audit -r requirements.txt

      - name: pip-audit - Scan complet (non bloquant pour les warnings)
        run: pip-audit -r requirements.txt
        continue-on-error: true

      # ── 04 BUILD DOCKER ───────────────────────────────────────────────────
      - name: Build Docker image
        run: docker compose build

      # ── 05 DÉMARRAGE APP ──────────────────────────────────────────────────
      - name: Start application
        run: |
          docker compose up -d
          sleep 20
        env:
          # FIXED [VULN-001]: Utiliser des GitHub Secrets pour tous les credentials CI/CD
          DB_HOST: db
          DB_USER: notepro
          DB_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
          DB_NAME: notepro
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}

      # ── 06 OWASP ZAP DAST ─────────────────────────────────────────────────
      - name: OWASP ZAP Baseline Scan
        # FIXED [VULN-007]: Épingler zaproxy/action-baseline par SHA
        uses: zaproxy/action-baseline@7cea08522cd386f6c675776d5e4296aecf61f33b  # v0.12.0
        with:
          target: 'http://localhost:5001'
          fail_action: false
          allow_issue_writing: false
        continue-on-error: true

      # ── 08 DÉPLOIEMENT SUR RAILWAY ────────────────────────────────────────
      - name: Deploy to Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # On installe le CLI Railway et on déploie. 
        # --detach permet de ne pas attendre la fin du déploiement dans GitHub Actions
        run: |
          npm i -g @railway/cli
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ── 07 ARRÊT ──────────────────────────────────────────────────────────
      - name: Stop containers
        if: always()  # Toujours nettoyer même si les étapes précédentes ont échoué
        run: docker compose down