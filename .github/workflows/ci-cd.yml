name: DevSecOps Pipeline

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write  # Nécessaire pour upload des résultats SARIF (ZAP, etc.)

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: notepro
          MYSQL_USER: notepro
          MYSQL_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── 01 FLAKE8 ─────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pip-audit bandit

      - name: Flake8 - Lint
        run: flake8 app/ --max-line-length=120 --exclude=app/templates

      # ── 02 BANDIT (SAST Python) ───────────────────────────────────────────
      - name: Bandit - SAST Python
        run: |
          bandit -r app/ -f txt -o bandit-report.txt --severity-level medium || true
          cat bandit-report.txt
        continue-on-error: false

      # ── 03 PIP-AUDIT (SCA) ────────────────────────────────────────────────
      - name: pip-audit - Scan dépendances (CVE)
        run: pip-audit -r requirements.txt

      - name: pip-audit - Scan complet (non bloquant pour les warnings)
        run: pip-audit -r requirements.txt
        continue-on-error: true

      # ── 04 BUILD DOCKER ───────────────────────────────────────────────────
      - name: Créer le fichier .env
        run: |
          echo "SECRET_KEY=${{ secrets.CI_SECRET_KEY }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.CI_MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.CI_MYSQL_PASSWORD }}" >> .env
          echo "DB_PASSWORD=${{ secrets.CI_MYSQL_PASSWORD }}" >> .env
          echo "DB_HOST=db" >> .env
          echo "DB_USER=notepro" >> .env
          echo "DB_NAME=notepro" >> .env
          echo "MYSQL_DATABASE=notepro" >> .env
          echo "MYSQL_USER=notepro" >> .env
          echo "DATABASE_URL=mysql+mysqlconnector://notepro:${{ secrets.CI_MYSQL_PASSWORD }}@db/notepro" >> .env
          echo "FLASK_ENV=development" >> .env
          echo "FLASK_DEBUG=false" >> .env

      - name: Build Docker image
        run: docker compose build

      # ── 05 DÉMARRAGE APP ──────────────────────────────────────────────────
      - name: Start application
        run: |
          docker compose up -d
          sleep 20
        env:
          DB_HOST: db
          DB_USER: notepro
          DB_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
          DB_NAME: notepro
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}

      # ── 06 OWASP ZAP DAST ─────────────────────────────────────────────────
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5001'
          fail_action: false
          allow_issue_writing: false
        continue-on-error: true

      # ── 08 DÉPLOIEMENT SUR RAILWAY ────────────────────────────────────────
      - name: Deploy to Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm i -g @railway/cli
          railway up --detach --service NotePro
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ── 07 ARRÊT ──────────────────────────────────────────────────────────
      - name: Stop containers
        if: always()  # Toujours nettoyer même si les étapes précédentes ont échoué
        run: docker compose down