services:
  web:
    build: .
    ports: [ "5001:8080" ]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # Pour le développement local, décommentez les lignes volumes ci-dessous
    # volumes:
    #   - .:/app
    networks:
      - notepro_net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')" ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  db:
    # image: mysql:8.0.36
    image: mysql:8.0.36
    # Le service db n'est accessible QUE depuis les conteneurs sur le réseau notepro_net
    # ports: ["3306:3306"]  ← RETIRÉ intentionnellement pour la sécurité
    env_file: .env
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "notepro", "-p${MYSQL_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - notepro_net

volumes:
  db_data:

networks:
  notepro_net:
    driver: bridge
